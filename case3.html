<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case 03 — Cooking</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcf9f5;
            color: #111111;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .container {
            max-width: 680px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .meta-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .case-badge {
            background-color: #111111;
            color: #ffffff;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .status-stamp {
            border: 1.5px dashed #b35936;
            color: #b35936;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            transform: rotate(-2deg);
        }

        .graphic-hero {
            background-color: #ebdcd0;
            background-image: linear-gradient(#e3d2c5 1px, transparent 1px), linear-gradient(90deg, #e3d2c5 1px, transparent 1px);
            background-size: 24px 24px;
            border: 1px solid #d3cdbfa0;
            border-radius: 12px;
            width: 100%;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            box-shadow: 0 4px 24px rgba(179, 89, 54, 0.03);
        }

        .icon-graphic {
            display: flex;
            align-items: center;
            gap: 36px;
        }

        .fork, .knife {
            font-size: 36px;
            color: #b35936;
            font-weight: 300;
            opacity: 0.85;
            user-select: none;
        }

        .target-circles {
            position: relative;
            width: 130px;
            height: 130px;
            border: 3px solid #b35936;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .target-circles::before {
            content: '';
            position: absolute;
            width: 86px;
            height: 86px;
            border: 2px solid #b35936;
            border-radius: 50%;
        }

        .target-circles::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 32px;
            background-color: #b35936;
            border-radius: 50%;
            animation: simmer 2.5s ease-in-out infinite alternate;
        }

        .small-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #b35936;
            border-radius: 50%;
            bottom: 28px;
            right: 32px;
        }

        h1 {
            font-family: "Georgia", serif;
            font-size: 32px;
            line-height: 1.3;
            font-weight: 600;
            color: #111111;
        }

        @keyframes simmer {
            0% {
                transform: scale(0.88);
                opacity: 0.75;
                box-shadow: 0 0 0 0 rgba(179, 89, 54, 0.2);
            }
            100% {
                transform: scale(1.08);
                opacity: 1;
                box-shadow: 0 0 0 12px rgba(179, 89, 54, 0);
            }
        }

        @media (max-width: 600px) {
            h1 { font-size: 26px; }
            .graphic-hero { height: 240px; }
            .target-circles { transform: scale(0.8); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="meta-header">
            <span class="case-badge">CASE 03</span>
            <span class="status-stamp">Simmering</span>
        </div>

        <div class="graphic-hero">
            <div class="icon-graphic">
                <span class="fork">F</span>
                <div class="target-circles">
                    <div class="small-dot"></div>
                </div>
                <span class="knife">¶</span>
            </div>
        </div>

        <h1>Cooking</h1>
        
    </div>

</body>
</html>
